services:
  mongo:
    image: mongo:7.0
    container_name: sea_fishing_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: sea_fishing
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
