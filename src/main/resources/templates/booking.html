<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои бронирования | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .section-title {
            border-left: 5px solid #0056b3;
            padding-left: 15px;
            margin-bottom: 0;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">⚓ SeaFishing Pro</a>
    </div>
    <div class="ms-auto">
        <a th:href="@{/profile}" class="btn btn-outline-light px-4">Профиль</a>
    </div>
</nav>

<div class="container pb-5">

    <!-- Header + button -->
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="section-title">Мои бронирования</h2>

        <a th:href="@{/user/booking-add}" class="btn btn-primary">
            Добавить бронирование
        </a>
    </div>

    <!-- Cancel success -->
    <div th:if="${param.canceled}" class="alert alert-success">
        Бронирование отменено.
    </div>

    <!-- Empty state -->
    <div th:if="${bookings == null or #lists.isEmpty(bookings)}" class="mt-4">
        <div class="alert alert-info m-0">
            У вас пока нет бронирований.
        </div>
    </div>

    <!-- List -->
    <div class="row row-cols-1 row-cols-md-2 g-4"
         th:if="${bookings != null and !#lists.isEmpty(bookings)}">

        <div class="col" th:each="b : ${bookings}">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <span th:text="${b.excursion.boat.boatName}">Лодка</span>
                    </h5>
                </div>

                <div class="card-body">
                    <p class="mb-1">
                        <strong>Начало:</strong>
                        <span th:text="${#temporals.format(b.excursion.startTime, 'dd.MM.yyyy HH:mm')}"></span>
                    </p>
                    <p class="mb-1">
                        <strong>Конец:</strong>
                        <span th:text="${#temporals.format(b.excursion.endTime, 'dd.MM.yyyy HH:mm')}"></span>
                    </p>
                    <p class="mb-1">
                        <strong>Место:</strong>
                        <span th:text="${b.spot.spotName}"></span>
                    </p>
                </div>

                <div class="card-footer d-flex justify-content-end">
                    <form th:action="@{/user/bookings/{bookingId}/cancel(bookingId=${b.bookingId})}"
                          method="post"
                          onsubmit="return confirm('Отменить бронирование?');">
                        <button type="submit" class="btn btn-sm btn-danger">
                            Отменить
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
