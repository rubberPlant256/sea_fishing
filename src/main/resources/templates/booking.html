<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Запись на рыбалку | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .booking-card { max-width: 600px; margin: 50px auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-sea { background-color: #0056b3; color: white; }
        .btn-sea:hover { background-color: #004494; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="card booking-card p-4">
        <h2 class="text-center mb-4">⚓ Запись на морскую прогулку</h2>

        <form th:action="@{/booking/save}" th:object="${booking}" method="post">

            <div class="mb-3">
                <label class="form-label">Выберите катер:</label>
                <select class="form-select" th:field="*{boatId}" required>
                    <option value="" disabled selected>-- Выберите судно --</option>
                    <option value="1">Sea Star (6 мест) - 2000₽/час</option>
                    <option value="2">Black Pearl (10 мест) - 4500₽/час</option>
                    <option value="3">Poseidon (4 места) - 1500₽/час</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Рыболовное место:</label>
                <select class="form-select" th:field="*{spotId}" required>
                    <option value="" disabled selected>-- Куда отправимся? --</option>
                    <option value="1">Синяя Бездна (Тунец, Марлин)</option>
                    <option value="2">Скалистая бухта (Окунь, Дорадо)</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Дата:</label>
                    <input type="date" class="form-control" th:field="*{date}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Длительность (часов):</label>
                    <input type="number" min="1" max="12" class="form-control" th:field="*{duration}" value="3">
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-sea btn-lg">Забронировать сейчас</button>
                <a th:href="@{/}" class="btn btn-outline-secondary">Отмена</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
