<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #eef6ff, #ffffff);
        }
        .login-card {
            max-width: 500px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background-color: white;
        }
        .login-card h2 {
            margin-bottom: 25px;
            color: #0056b3;
            font-weight: bold;
            text-align: center;
        }
        .form-control {
            margin-bottom: 15px;
        }
        .btn-login {
            background-color: #0056b3;
            color: white;
            font-weight: bold;
            width: 100%;
        }
        .btn-login:hover {
            background-color: #003d80;
        }
        .register-link {
            text-align: center;
            margin-top: 15px;
        }
        .register-link a {
            color: #0056b3;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #b71c1c;
            background-color: #ffebee;
            border: 1px solid #f44336;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">⚓ SeaFishing</a>
        <div class="ms-auto">
            <a th:href="@{/register}" class="btn btn-outline-light px-4">Регистрация</a>
        </div>
    </div>
</nav>

<div class="login-card">
    <h2>Вход</h2>

    <!-- Ошибка авторизации -->
    <div th:if="${param.error}" class="error-message">
        Неверный email или пароль
    </div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Email" class="form-control" required/>
        <input type="password" name="password" placeholder="Пароль" class="form-control" required/>
        <button type="submit" class="btn btn-login">Войти</button>
    </form>

    <div class="register-link">
        Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
    </div>
</div>

</body>
</html>
