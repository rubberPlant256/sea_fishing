<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Экскурсии администратора | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #212529;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #0d6efd;
            color: white;
        }

        /* Контент справа */
        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .section-title {
            border-left: 5px solid #0056b3;
            padding-left: 15px;
            margin-bottom: 30px;
        }

        .excursion-card {
            transition: 0.3s;
        }

        .excursion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">

<!-- 🔹 Sidebar -->
<div th:replace="fragments/sidebar :: sidebar('excursions')"></div>

<!-- 🔹 Контент -->
<div class="content">

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="section-title mb-0">
            Расписание экскурсий с сегодняшнего дня
        </h2>

        <a th:href="@{/admin/create-excursion}"
           class="btn btn-primary ms-3">
            Добавить экскурсию
        </a>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4" th:if="${excursions != null}">
        <div class="col" th:each="excursion : ${excursions}">
            <div class="card h-100 shadow-sm excursion-card">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0" th:text="${excursion.boat.boatName}">Лодка</h5>
                </div>
                <div class="card-body">
                    <p><strong>Начало:</strong>
                        <span th:text="${#temporals.format(excursion.startTime, 'dd.MM.yyyy HH:mm')}"></span>
                    </p>
                    <p><strong>Конец:</strong>
                        <span th:text="${#temporals.format(excursion.endTime, 'dd.MM.yyyy HH:mm')}"></span>
                    </p>
                    <p><strong>Цена за час:</strong>
                        <span th:text="${excursion.boat.pricePerHour} + ' ₽'"></span>
                    </p>
                </div>
                <div class="card-footer text-end">
                    <a th:href="@{/admin/excursion/delete/{id}(id=${excursion.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Вы уверены, что хотите удалить эту экскурсию?');">
                        Удалить
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(excursions)}" class="alert alert-info mt-4">
        Экскурсий на сегодня и позже пока нет.
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
