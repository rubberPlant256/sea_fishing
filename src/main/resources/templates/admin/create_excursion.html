<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создать экскурсию | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .section-title { border-left: 5px solid #0056b3; padding-left: 15px; margin-bottom: 30px; }
        .selectable-card { cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .selectable-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .selected-item { border-color: #0056b3 !important; background-color: #eef6ff; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">⚓ SeaFishing Pro</a>
    </div>
</nav>

<div class="container pb-5">
    <form th:action="@{/admin/create-excursion}" th:object="${excursion}" method="post">
        <!-- Скрытое поле для выбранной лодки -->
        <input type="hidden" id="selectedBoatId" th:field="*{boat}" required>

        <h2 class="section-title">1. Выберите лодку</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4 mb-5">
            <div class="col" th:each="boat : ${boats}">
                <div class="card h-100 shadow-sm selectable-card boat-card" th:data-id="${boat.boatId}">
                    <div class="card-body">
                        <h5 class="card-title text-primary" th:text="|🚤 ${boat.boatName}|"></h5>
                        <p class="card-text small">Профессиональный катер для прибрежной ловли.</p>
                        <ul class="list-unstyled mt-3 small">
                            <li><strong>Вместимость:</strong> <span th:text="${boat.capacity}"></span> чел.</li>
                            <li><strong>Цена:</strong> <span th:text="${boat.pricePerHour} + ' ₽/час'"></span></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="section-title">2. Детали экскурсии</h2>
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold">Начало экскурсии:</label>
                <input type="datetime-local" th:field="*{startTime}" class="form-control" required/>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Конец экскурсии:</label>
                <input type="datetime-local" th:field="*{endTime}" class="form-control" required/>
            </div>
        </div>

        <div class="text-end">
            <button type="submit" class="btn btn-success btn-lg px-5 fw-bold">Создать экскурсию</button>
        </div>

        <div th:if="${param.success}" class="alert alert-success mt-3">
            Экскурсия успешно создана!
        </div>
    </form>
</div>

<script>
    document.querySelectorAll('.selectable-card').forEach(card => {
        card.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            document.querySelectorAll('.boat-card').forEach(c => c.classList.remove('selected-item'));
            document.getElementById('selectedBoatId').value = id;
            this.classList.add('selected-item');
        });
    });
</script>

</body>
</html>
