<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Лодки администратора | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .section-title { border-left: 5px solid #0056b3; padding-left: 15px; margin-bottom: 30px; }
        .boats-card { border: 0; border-radius: 18px; overflow: hidden; }
        .boats-table thead th { background-color: #f2f7ff; color: #0d47a1; border-bottom: 0; }
        .boats-table tbody tr { vertical-align: middle; }
        .boats-table tbody tr:hover { background-color: #f8fbff; }
        .price-badge { background-color: #e3f2fd; color: #0d47a1; }
        body {
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #212529;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #0d6efd;
            color: white;
        }

        /* Контент справа */
        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .section-title {
            border-left: 5px solid #0056b3;
            padding-left: 15px;
            margin-bottom: 30px;
        }

    </style>
</head>
<body class="bg-light">

<div th:replace="fragments/sidebar :: sidebar('boats')"></div>

<div class="content">
    <div class="container pb-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <h2 class="section-title mb-0">Лодки</h2>
            <a th:href="@{/admin/boats/add}" class="btn btn-success px-4">Добавить новую лодку</a>
        </div>

        <div class="card shadow-sm boats-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table boats-table mb-0">
                        <thead>
                        <tr>
                            <th class="px-4 py-3">Название</th>
                            <th class="px-4 py-3">Вместимость</th>
                            <th class="px-4 py-3">Цена за час</th>
                            <th class="px-4 py-3 text-end">Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="boat : ${boats}">
                            <td class="px-4 py-3 fw-semibold" th:text="${boat.boatName}">Название</td>
                            <td class="px-4 py-3">
                                <span class="badge rounded-pill text-bg-light border" th:text="${boat.capacity} + ' чел.'">0 чел.</span>
                            </td>
                            <td class="px-4 py-3">
                                <span class="badge rounded-pill price-badge px-3 py-2"
                                      th:text="${boat.pricePerHour} + ' ₽'">0 ₽</span>
                            </td>
                            <td class="px-4 py-3 text-end">
                                <a th:href="@{/admin/boats/delete/{id}(id=${boat.boatId})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Вы уверены, что хотите удалить лодку?');">Удалить</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(boats)}">
                            <td colspan="4" class="px-4 py-5 text-center text-muted">
                                Пока что в системе нет ни одной лодки.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
