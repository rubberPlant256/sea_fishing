<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Бронирования админа | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .section-title { border-left: 5px solid #0056b3; padding-left: 15px; margin-bottom: 30px; }
        .selectable-card { cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .selectable-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .selected-item { border-color: #0056b3 !important; background-color: #eef6ff; }
        body {
            overflow-x: hidden;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #212529;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #0d6efd;
            color: white;
        }

        /* Контент справа */
        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .section-title {
            border-left: 5px solid #0056b3;
            padding-left: 15px;
            margin-bottom: 30px;
        }

        .excursion-card {
            transition: 0.3s;
        }

        .excursion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="fragments/sidebar :: sidebar('bookings')"></div>

<div class="content">
    <div class="container pb-5">

        <h2 class="section-title">Все бронирования</h2>

        <div th:if="${param.canceled}" class="alert alert-success mb-4">
            Бронирование отменено.
        </div>

        <div th:if="${bookings != null and !#lists.isEmpty(bookings)}"
             class="row row-cols-1 row-cols-md-2 g-4">

            <div class="col" th:each="b : ${bookings}">
                <div class="card h-100 shadow-sm">

                    <div class="card-header bg-primary text-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Бронирование #<span th:text="${b.bookingId}">0</span></h5>
                            <span class="badge bg-light text-dark"
                                  th:text="${b.user.email}">email</span>
                        </div>
                    </div>

                    <div class="card-body">
                        <p class="mb-2">
                            <strong>Лодка:</strong>
                            <span th:text="${b.excursion.boat.boatName}">Boat</span>
                        </p>

                        <p class="mb-2">
                            <strong>Начало:</strong>
                            <span th:text="${#temporals.format(b.excursion.startTime, 'dd.MM.yyyy HH:mm')}"></span>
                        </p>

                        <p class="mb-2">
                            <strong>Конец:</strong>
                            <span th:text="${#temporals.format(b.excursion.endTime, 'dd.MM.yyyy HH:mm')}"></span>
                        </p>

                        <p class="mb-0">
                            <strong>Место:</strong>
                            <span th:text="${b.spot.spotName}">Spot</span>
                        </p>
                    </div>

                    <div class="card-footer d-flex justify-content-end">
                        <form th:action="@{/admin/bookings/{bookingId}/cancel(bookingId=${b.bookingId})}"
                              method="post"
                              onsubmit="return confirm('Отменить бронирование пользователя?');">
                            <button type="submit" class="btn btn-sm btn-danger">
                                Отменить
                            </button>
                        </form>
                    </div>

                </div>
            </div>

        </div>

        <div th:if="${bookings == null or #lists.isEmpty(bookings)}" class="alert alert-info mt-4">
            Бронирований пока нет.
        </div>

    </div>
</div>
</body>
</html>
