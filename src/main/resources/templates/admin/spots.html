<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Места ловли администратора | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .section-title { border-left: 5px solid #0056b3; padding-left: 15px; margin-bottom: 30px; }
        .spot-card { border: 0; border-radius: 18px; overflow: hidden; transition: 0.3s; }
        .spot-card:hover { transform: translateY(-4px); box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08); }
        .spot-meta { background-color: #f2f7ff; color: #0d47a1; }
        .fauna-row { border-bottom: 1px solid #eef2f7; }
        .fauna-row:last-child { border-bottom: 0; }
        body {
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #212529;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #0d6efd;
            color: white;
        }

        /* Контент справа */
        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .section-title {
            border-left: 5px solid #0056b3;
            padding-left: 15px;
            margin-bottom: 30px;
        }

    </style>
</head>
<body class="bg-light">

<div th:replace="fragments/sidebar :: sidebar('spots')"></div>

<div class="content">
    <div class="container pb-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <h2 class="section-title mb-0">Места ловли</h2>
            <a th:href="@{/admin/spots/add}" class="btn btn-success px-4">Добавить место ловли</a>
        </div>

        <div class="row row-cols-1 row-cols-xl-2 g-4" th:if="${spots != null}">
            <div class="col" th:each="spot : ${spots}">
                <div class="card shadow-sm h-100 spot-card">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-start gap-3">
                        <div>
                            <h5 class="mb-1" th:text="${spot.spotName}">Название места</h5>
                            <div class="small opacity-75">Управление местом ловли и связанной фауной</div>
                        </div>
                        <a th:href="@{/admin/spots/delete/{id}(id=${spot.spotId})}" class="btn btn-sm btn-outline-light"
                           onclick="return confirm('Удалить место ловли вместе со всей связанной фауной?');">Удалить место</a>
                    </div>
                    <div class="card-body">
                        <div class="d-flex flex-wrap gap-2 mb-4">
                            <span class="badge rounded-pill spot-meta px-3 py-2"
                                  th:text="'Глубина: ' + ${spot.depthMeters} + ' м'">Глубина</span>
                            <span class="badge rounded-pill spot-meta px-3 py-2"
                                  th:text="'Дно: ' + ${spot.bottomType}">Дно</span>
                        </div>

                        <h6 class="mb-3">Связанная фауна</h6>
                        <div class="border rounded-3 overflow-hidden mb-4">
                            <div class="d-flex justify-content-between align-items-center px-3 py-3 fauna-row"
                                 th:each="fauna : ${spot.fauna}">
                                <div>
                                    <div class="fw-semibold" th:text="${fauna.fish.fishName}">Рыба</div>
                                    <div class="small text-muted"
                                         th:text="${#strings.isEmpty(fauna.seasonality) ? 'Сезонность не указана' : fauna.seasonality}">
                                        Сезонность
                                    </div>
                                </div>
                                <a th:href="@{/admin/spots/{spotId}/fauna/delete/{fishId}(spotId=${spot.spotId},fishId=${fauna.fish.fishId})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Удалить эту запись фауны?');">Удалить</a>
                            </div>
                            <div th:if="${#lists.isEmpty(spot.fauna)}" class="px-3 py-4 text-muted text-center">
                                Для этого места пока не добавлена фауна.
                            </div>
                        </div>

                        <form th:action="@{/admin/spots/{spotId}/fauna/add(spotId=${spot.spotId})}" method="post" class="row g-3 align-items-end">
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Добавить рыбу</label>
                                <select name="fishId" class="form-select" required>
                                    <option value="">Выберите рыбу</option>
                                    <option th:each="fish : ${fishes}" th:value="${fish.fishId}" th:text="${fish.fishName}"></option>
                                </select>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Сезонность</label>
                                <input type="text" name="seasonality" class="form-control" placeholder="Например: май - сентябрь" maxlength="255" required>
                            </div>
                            <div class="col-md-2 d-grid">
                                <button type="submit" class="btn btn-outline-primary">Добавить</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(spots)}" class="alert alert-info mt-4">
            Пока что места ловли не добавлены.
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
