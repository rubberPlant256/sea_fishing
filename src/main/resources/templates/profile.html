<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">⚓ SeaFishing</a>
    </div>
    <div class="ms-auto">
        <a th:href="@{/user/booking}" class="btn btn-outline-light px-4">Бронирования</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4">👤 Профиль пользователя</h2>

        <form th:action="@{/profile/update}" th:object="${user}" method="post">
            <input type="hidden" th:field="*{userId}"/>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}">
            </div>

            <div class="mb-3">
                <label class="form-label">Фамилия</label>
                <input type="text" class="form-control" th:field="*{surname}">
            </div>

            <div class="mb-3">
                <label class="form-label">Имя</label>
                <input type="text" class="form-control" th:field="*{name}">
            </div>

            <div class="mb-3">
                <label class="form-label">Отчество</label>
                <input type="text" class="form-control" th:field="*{patronymic}">
            </div>

            <button type="submit" class="btn btn-primary">Сохранить</button>
        </form>

        <hr class="my-5"/>

        <h4 class="mb-3">🔐 Смена пароля</h4>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/profile/change-password}" method="post">
            <input type="hidden" name="userId" th:value="${user.userId}"/>

            <div class="mb-3">
                <label class="form-label">Старый пароль</label>
                <input type="password" name="oldPassword" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Новый пароль</label>
                <input type="password" name="newPassword" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Сменить пароль</button>
        </form>
    </div>
</div>

</body>
</html>
