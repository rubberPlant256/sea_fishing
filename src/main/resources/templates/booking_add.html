<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Выбор экскурсии | SeaFishing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .section-title { border-left: 5px solid #0056b3; padding-left: 15px; margin-bottom: 30px; }
        .selectable-card { cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .selectable-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .selected-item { border-color: #0056b3 !important; background-color: #eef6ff; }
        .sticky-booking-bar { position: sticky; bottom: 0; background: white; padding: 20px 0; border-top: 2px solid #0056b3; z-index: 1000; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">⚓ SeaFishing Pro</a>

    </div>
</nav>

<div class="container pb-5">

    <form th:action="@{/user/booking/save}" th:object="${booking}" method="post" id="bookingForm">
        <input type="hidden" id="selectedExcursionId" th:field="*{excursionId}" required>
        <input type="hidden" id="selectedSpotId" th:field="*{spotId}" required>

        <h2 class="section-title">1. Выберите экскурсию</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4 mb-5">
            <div class="col" th:each="excursion : ${excursions}">
                <div class="card h-100 shadow-sm selectable-card excursion-card"
                     th:data-id="${excursion.id}">
                    <div class="card-body">
                        <h5 class="card-title text-primary" th:text="|🚤 ${excursion.boat.boatName}|"></h5>

                        <p class="small mb-1">
                            <strong>Начало:</strong>
                            <span th:text="${#temporals.format(excursion.startTime, 'dd.MM.yyyy HH:mm')}"></span>
                        </p>
                        <p class="small mb-1">
                            <strong>Конец:</strong>
                            <span th:text="${#temporals.format(excursion.endTime, 'dd.MM.yyyy HH:mm')}"></span>
                        </p>
                        <p class="small mb-0">
                            <strong>Цена за час:</strong>
                            <span th:text="${excursion.boat.pricePerHour} + ' ₽/час'"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="section-title">2. Выберите место ловли</h2>
        <div class="row g-4 mb-5">
            <div class="col-md-6" th:each="spot : ${spots}">
                <div class="card shadow-sm selectable-card spot-card" th:data-id="${spot.spotId}">
                    <div class="card-header bg-white fw-bold" th:text="'📍 ' + ${spot.spotName}"></div>
                    <div class="card-body small">
                        <p class="mb-1">
                            <strong>Кто клюет:</strong>
                        </p>
                        <ul class="mb-0">
                            <li th:each="sf : ${spot.fauna}">
                                <span th:text="${sf.fish.fishName}">Fish Name</span>
                                <span th:text="${sf.seasonality}">Seasonality</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="sticky-booking-bar shadow">
            <div class="container">
                <div class="row align-items-end">
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-warning btn-lg px-5 fw-bold">
                            ЗАБРОНИРОВАТЬ ЭКСКУРСИЮ
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>

</div>

<script>
    document.querySelectorAll('.selectable-card').forEach(card => {
        card.addEventListener('click', function() {
            const isExcursion = this.classList.contains('excursion-card');
            const id = this.getAttribute('data-id');

            if (isExcursion) {
                document.querySelectorAll('.excursion-card').forEach(c => c.classList.remove('selected-item'));
                document.getElementById('selectedExcursionId').value = id;
            } else {
                document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('selected-item'));
                document.getElementById('selectedSpotId').value = id;
            }
            this.classList.add('selected-item');
        });
    });
</script>

</body>
</html>
